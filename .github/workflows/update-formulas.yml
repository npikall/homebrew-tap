name: Update Formulas

on:
  workflow_dispatch:
    inputs:
      tool:
        description: "Tool to update (leave blank to update all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula(s)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/update-formulas.sh
          scripts/update-formulas.sh "${{ inputs.tool }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          if git diff --staged --quiet; then
            echo "No formula changes."
          else
            git commit -m "chore: update formulas [skip ci]"
            git push
          fi
